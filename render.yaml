services:
  # Backend API server
  - type: web
    name: barberman-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
 
  # Telegram bot (web service sifatida, bepul tarifda worker yo'q)
  - type: web
    name: barberman-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
 
