<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarberMan — Onlayn navbat</title>
<style>
  :root{
    --bg:#141414;
    --panel:#1e1e1e;
    --panel2:#262626;
    --accent:#d4a24c;
    --accent2:#b8823a;
    --text:#f2f0ea;
    --text2:#a8a49b;
    --border:#333331;
    --danger:#d05a4a;
    --success:#4ca87a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    background:var(--panel);
    padding:22px 20px;
    text-align:center;
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:10;
  }
  header h1{
    font-size:22px;
    letter-spacing:1px;
    color:var(--accent);
    font-weight:700;
  }
  header p{color:var(--text2);font-size:13px;margin-top:4px;}
  .tabs{
    display:flex;
    max-width:520px;
    margin:16px auto 0;
    background:var(--panel);
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .tab{
    flex:1;text-align:center;padding:12px;
    cursor:pointer;font-size:14px;color:var(--text2);
    transition:.2s;
  }
  .tab.active{background:var(--accent);color:#141414;font-weight:600;}
  .container{max-width:520px;margin:20px auto;padding:0 16px;}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
  }
  .card h2{font-size:16px;margin-bottom:14px;color:var(--accent);}
  .services{display:flex;flex-direction:column;gap:10px;}
  .service-opt{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--panel2);
    border:2px solid transparent;
    border-radius:10px;
    padding:14px 16px;
    cursor:pointer;
    transition:.15s;
  }
  .service-opt.selected{border-color:var(--accent);background:#2c2519;}
  .service-opt .name{font-size:15px;font-weight:600;}
  .service-opt .dur{font-size:12px;color:var(--text2);margin-top:2px;}
  .service-opt .price{color:var(--accent);font-weight:700;font-size:14px;}
  label{display:block;font-size:13px;color:var(--text2);margin:14px 0 6px;}
  input, select{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--panel2);
    color:var(--text);
    font-size:14px;
  }
  input:focus, select:focus{outline:none;border-color:var(--accent);}
  .slots{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-top:10px;
  }
  .slot{
    padding:10px 4px;
    text-align:center;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--panel2);
    font-size:13px;
    cursor:pointer;
    transition:.15s;
  }
  .slot.selected{background:var(--accent);color:#141414;font-weight:700;border-color:var(--accent);}
  .slot.taken{opacity:.3;text-decoration:line-through;cursor:not-allowed;}
  .btn{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:#141414;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    margin-top:16px;
    transition:.15s;
  }
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .booking-item{
    background:var(--panel2);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
    border-left:3px solid var(--accent);
  }
  .booking-item .top{display:flex;justify-content:space-between;align-items:center;}
  .booking-item .bname{font-weight:700;font-size:15px;}
  .booking-item .bdate{color:var(--accent);font-size:13px;font-weight:600;}
  .booking-item .bmeta{color:var(--text2);font-size:13px;margin-top:6px;}
  .booking-item .btns{display:flex;gap:8px;margin-top:10px;}
  .booking-item button{
    flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);font-size:12px;cursor:pointer;
  }
  .booking-item button.del{color:var(--danger);border-color:var(--danger);}
  .empty{text-align:center;color:var(--text2);padding:30px 10px;font-size:14px;}
  .success-box{
    text-align:center;padding:30px 10px;
  }
  .success-box i{font-size:44px;color:var(--success);}
  .success-box h3{margin-top:14px;font-size:18px;}
  .success-box p{color:var(--text2);margin-top:6px;font-size:14px;}
  .hidden{display:none;}
  .datewrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-top:6px;}
  .datebox{
    min-width:58px;text-align:center;padding:10px 6px;
    border-radius:10px;border:1px solid var(--border);
    background:var(--panel2);cursor:pointer;font-size:12px;flex-shrink:0;
  }
  .datebox.selected{background:var(--accent);color:#141414;font-weight:700;border-color:var(--accent);}
  .datebox .dow{font-size:10px;color:inherit;opacity:.8;}
  .datebox .dnum{font-size:16px;font-weight:700;margin:2px 0;}
  .badge-count{
    background:var(--accent);color:#141414;border-radius:20px;
    font-size:11px;padding:1px 7px;margin-left:6px;font-weight:700;
  }
  .toast-wrap{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);
    z-index:1000;
    display:flex;flex-direction:column;gap:8px;
    width:calc(100% - 32px);max-width:480px;
    pointer-events:none;
  }
  .toast{
    background:var(--panel2);
    border:1px solid var(--accent);
    border-radius:12px;
    padding:14px 16px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    animation:toast-in .25s ease-out;
    pointer-events:auto;
  }
  .toast.leaving{animation:toast-out .25s ease-in forwards;}
  .toast .icon{
    width:32px;height:32px;border-radius:50%;
    background:var(--accent);color:#141414;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
  }
  .toast .body{flex:1;}
  .toast .title{font-weight:700;font-size:14px;}
  .toast .desc{font-size:12px;color:var(--text2);margin-top:2px;}
  @keyframes toast-in{
    from{opacity:0;transform:translateY(-12px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes toast-out{
    from{opacity:1;transform:translateY(0);}
    to{opacity:0;transform:translateY(-12px);}
  }
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<header>
  <h1>✂ BARBERMAN</h1>
  <p>Onlayn navbat — soch va soqol olish</p>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="book">Navbat olish</div>
    <div class="tab" data-tab="admin">Mening navbatlarim <span class="badge-count" id="countBadge">0</span></div>
  </div>

  <!-- BOOKING TAB -->
  <div id="tab-book">

    <div class="card">
      <h2>1. Xizmatni tanlang</h2>
      <div class="services" id="services"></div>
    </div>

    <div class="card">
      <h2>2. Kunni tanlang</h2>
      <div class="datewrap" id="dateWrap"></div>
    </div>

    <div class="card">
      <h2>3. Vaqtni tanlang</h2>
      <div class="slots" id="slots"></div>
    </div>

    <div class="card">
      <h2>4. Ma'lumotlaringiz</h2>
      <label>Ismingiz</label>
      <input type="text" id="clientName" placeholder="Masalan: Aziz Karimov">
      <label>Telefon raqamingiz</label>
      <input type="tel" id="clientPhone" placeholder="+998 90 123 45 67">
      <button class="btn" id="submitBtn">Navbatni tasdiqlash</button>
    </div>

    <div class="card success-box hidden" id="successBox">
      <i class="ti ti-circle-check"></i>
      <h3>Navbat qabul qilindi!</h3>
      <p id="successText"></p>
      <p id="successCode" style="margin-top:10px;font-size:15px;color:var(--accent);font-weight:700;"></p>
      <p style="margin-top:4px;font-size:12px;color:var(--text2);">Bu kodni saqlab qo'ying — navbatni bekor qilish uchun kerak bo'ladi</p>
    </div>

    <div class="card">
      <h2><i class="ti ti-x" style="font-size:16px;vertical-align:-2px;margin-right:4px;"></i>Navbatni bekor qilish</h2>
      <label>Telefon raqamingiz</label>
      <input type="tel" id="cancelPhone" placeholder="+998 90 123 45 67">
      <label>Bekor qilish kodi</label>
      <input type="text" id="cancelCode" placeholder="6 xonali kod" maxlength="6">
      <button class="btn" id="cancelBtn" style="background:var(--danger);color:#fff;">Navbatni bekor qilish</button>
      <p id="cancelResult" style="margin-top:10px;font-size:13px;text-align:center;"></p>
    </div>

  </div>

  <!-- ADMIN TAB -->
  <div id="tab-admin" class="hidden">
    <div class="card">
      <h2>Barcha navbatlar</h2>
      <div id="bookingsList"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css"></script>
<script>
// ====== BACKEND SERVER MANZILI ======
const API_BASE = "https://barberman-api-23cb.onrender.com";
// ======================================

const SERVICES = [
  {id:'hair', name:'Soch olish', dur:30},
  {id:'beard', name:'Soqol olish', dur:20},
  {id:'both', name:'Soch + Soqol', dur:50},
];

let selectedService = null;
let selectedDate = null;
let selectedSlot = null;

async function apiGet(path){
  const res = await fetch(API_BASE + path);
  if(!res.ok) throw new Error('So\'rov xato: ' + res.status);
  return res.json();
}
async function apiPost(path, body){
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    const err = new Error(data.detail || 'So\'rov xato');
    err.status = res.status;
    throw err;
  }
  return data;
}
async function apiDelete(path){
  const res = await fetch(API_BASE + path, {method:'DELETE'});
  if(!res.ok) throw new Error('O\'chirishda xato');
  return res.json();
}

// ---------- render services ----------
function renderServices(){
  const wrap = document.getElementById('services');
  wrap.innerHTML = '';
  SERVICES.forEach(s=>{
    const el = document.createElement('div');
    el.className = 'service-opt' + (selectedService===s.id ? ' selected':'');
    el.innerHTML = `
      <div>
        <div class="name">${s.name}</div>
        <div class="dur">${s.dur} daqiqa</div>
      </div>
    `;
    el.onclick = ()=>{ selectedService = s.id; selectedSlot=null; renderServices(); renderSlots(); };
    wrap.appendChild(el);
  });
}

// ---------- render dates (next 14 days) ----------
const DOW = ['Yak','Dush','Sesh','Chor','Pay','Jum','Shan'];
function renderDates(){
  const wrap = document.getElementById('dateWrap');
  wrap.innerHTML = '';
  const today = new Date();
  for(let i=0;i<14;i++){
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    const key = d.toISOString().slice(0,10);
    if(selectedDate===null && i===0) selectedDate = key;
    const box = document.createElement('div');
    box.className = 'datebox' + (selectedDate===key ? ' selected':'');
    box.innerHTML = `<div class="dow">${DOW[d.getDay()]}</div><div class="dnum">${d.getDate()}</div>`;
    box.onclick = ()=>{ selectedDate = key; selectedSlot=null; renderDates(); renderSlots(); };
    wrap.appendChild(box);
  }
}

// ---------- render time slots ----------
async function renderSlots(){
  const wrap = document.getElementById('slots');
  if(!selectedDate){ wrap.innerHTML = '<div class="empty">Avval kunni tanlang</div>'; return; }
  if(!selectedService){ wrap.innerHTML = '<div class="empty">Avval xizmatni tanlang</div>'; return; }

  wrap.innerHTML = '<div class="empty">Yuklanmoqda...</div>';

  let data;
  try{
    data = await apiGet(`/slots?date=${selectedDate}&service_id=${selectedService}`);
  }catch(e){
    wrap.innerHTML = '<div class="empty">Serverga ulanib bo\'lmadi. Birozdan so\'ng qayta urining.</div>';
    return;
  }

  const slots = data.slots || [];
  if(slots.length === 0){
    wrap.innerHTML = '<div class="empty">Bu kun uchun bo\'sh vaqt qolmadi</div>';
    return;
  }

  wrap.innerHTML = '';
  slots.forEach(s=>{
    const el = document.createElement('div');
    el.className = 'slot' + (selectedSlot===s.time?' selected':'') + (s.taken?' taken':'');
    el.textContent = s.time;
    if(!s.taken){
      el.onclick = ()=>{ selectedSlot = s.time; renderSlots(); };
    }
    wrap.appendChild(el);
  });
}

// ---------- submit booking ----------
document.getElementById('submitBtn').onclick = async ()=>{
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();

  if(!selectedService){ alert('Iltimos, xizmat turini tanlang'); return; }
  if(!selectedDate){ alert('Iltimos, kunni tanlang'); return; }
  if(!selectedSlot){ alert('Iltimos, vaqtni tanlang'); return; }
  if(!name){ alert('Iltimos, ismingizni kiriting'); return; }
  if(!phone){ alert('Iltimos, telefon raqamingizni kiriting'); return; }

  const svc = SERVICES.find(s=>s.id===selectedService);
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Yuborilmoqda...';

  try{
    const result = await apiPost('/bookings', {
      name, phone,
      service_id: selectedService,
      date: selectedDate,
      time: selectedSlot,
      source: 'site'
    });

    document.getElementById('successText').textContent =
      `${name}, siz ${formatDate(selectedDate)} kuni soat ${selectedSlot} da (${svc.name}, ${svc.dur} daqiqa) navbatga yozildingiz.`;
    document.getElementById('successCode').textContent = `Bekor qilish kodi: ${result.cancel_code}`;
    document.getElementById('successBox').classList.remove('hidden');

    document.getElementById('clientName').value='';
    document.getElementById('clientPhone').value='';
    selectedSlot = null;
    await renderSlots();

    setTimeout(()=>{ document.getElementById('successBox').classList.add('hidden'); }, 15000);
  }catch(e){
    if(e.status === 409){
      alert('Afsuski bu vaqt band qilib bo\'lindi. Boshqa vaqtni tanlang.');
      await renderSlots();
    }else{
      alert('Xatolik yuz berdi. Birozdan so\'ng qayta urining.');
    }
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Navbatni tasdiqlash';
  }
};

function formatDate(dateStr){
  const d = new Date(dateStr);
  return `${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

// ---------- cancel booking by client ----------
document.getElementById('cancelBtn').onclick = async ()=>{
  const phone = document.getElementById('cancelPhone').value.trim();
  const code = document.getElementById('cancelCode').value.trim();
  const resultEl = document.getElementById('cancelResult');

  if(!phone || !code){
    resultEl.style.color = 'var(--danger)';
    resultEl.textContent = 'Telefon raqami va kodni kiriting';
    return;
  }

  const btn = document.getElementById('cancelBtn');
  btn.disabled = true;
  btn.textContent = 'Tekshirilmoqda...';
  resultEl.textContent = '';

  try{
    await apiPost('/bookings/cancel', {phone, cancel_code: code});
    resultEl.style.color = 'var(--success)';
    resultEl.textContent = 'Navbat muvaffaqiyatli bekor qilindi';
    document.getElementById('cancelPhone').value = '';
    document.getElementById('cancelCode').value = '';
    await renderSlots();
    await updateBadge();
  }catch(e){
    resultEl.style.color = 'var(--danger)';
    resultEl.textContent = 'Bunday navbat topilmadi. Telefon raqami yoki kod noto\'g\'ri';
  }finally{
    btn.disabled = false;
    btn.textContent = 'Navbatni bekor qilish';
  }
};

// ---------- admin tab ----------
async function renderAdminList(){
  const wrap = document.getElementById('bookingsList');
  wrap.innerHTML = '<div class="empty">Yuklanmoqda...</div>';

  let bookings;
  try{
    bookings = await apiGet('/bookings');
  }catch(e){
    wrap.innerHTML = '<div class="empty">Serverga ulanib bo\'lmadi. Birozdan so\'ng qayta urining.</div>';
    return;
  }

  if(bookings.length===0){
    wrap.innerHTML = '<div class="empty">Hozircha navbatlar yo\'q</div>';
    return;
  }
  wrap.innerHTML = '';
  bookings.forEach(b=>{
    const el = document.createElement('div');
    el.className = 'booking-item';
    const sourceLabel = b.source === 'bot' ? ' · Telegram bot' : ' · Sayt';
    el.innerHTML = `
      <div class="top">
        <div class="bname">${escapeHtml(b.name)}</div>
        <div class="bdate">${formatDate(b.date)} · ${b.time}</div>
      </div>
      <div class="bmeta"><i class="ti ti-phone" style="font-size:13px;vertical-align:-1px;margin-right:4px;"></i>${escapeHtml(b.phone)} &nbsp;·&nbsp; ${b.service_name} (${b.duration} daq)${sourceLabel}</div>
      <div class="bmeta" style="margin-top:2px;">Kod: ${b.cancel_code || '—'}</div>
      <div class="btns">
        <button class="del" data-id="${b.id}">O'chirish</button>
      </div>
    `;
    wrap.appendChild(el);
  });
  wrap.querySelectorAll('button.del').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = Number(btn.dataset.id);
      btn.disabled = true;
      btn.textContent = 'O\'chirilmoqda...';
      try{
        await apiDelete(`/bookings/${id}`);
        await renderAdminList();
        await renderSlots();
        await updateBadge();
      }catch(e){
        alert('O\'chirishda xatolik yuz berdi');
        btn.disabled = false;
        btn.textContent = 'O\'chirish';
      }
    };
  });
}

function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

async function updateBadge(){
  try{
    const bookings = await apiGet('/bookings');
    document.getElementById('countBadge').textContent = bookings.length;
  }catch(e){
    document.getElementById('countBadge').textContent = '?';
  }
}

// ---------- tabs ----------
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('tab-book').classList.toggle('hidden', target!=='book');
    document.getElementById('tab-admin').classList.toggle('hidden', target!=='admin');
    if(target==='admin') renderAdminList();
  };
});

// ---------- init ----------
renderServices();
renderDates();
renderSlots();
updateBadge();

// ---------- Bildirishnoma tizimi ----------
let knownBookingIds = null; // birinchi yuklanishda to'ldiriladi (eski navbatlar uchun bildirishnoma chiqmasin)
let notificationsEnabled = false;

function showToast(title, desc){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `
    <div class="icon"><i class="ti ti-bell"></i></div>
    <div class="body">
      <div class="title">${escapeHtml(title)}</div>
      <div class="desc">${escapeHtml(desc)}</div>
    </div>
  `;
  wrap.appendChild(el);
  setTimeout(()=>{
    el.classList.add('leaving');
    setTimeout(()=>el.remove(), 250);
  }, 6000);
}

function playNotificationSound(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playBeep = (freq, startTime, duration)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, ctx.currentTime + startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    };
    playBeep(880, 0, 0.15);
    playBeep(1100, 0.15, 0.2);
  }catch(e){
    // ovoz ijro etilmasa jim o'tkazamiz
  }
}

function showBrowserNotification(title, desc){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted'){
    try{
      new Notification(title, {body: desc, icon: '✂️'});
    }catch(e){}
  }
}

function requestNotificationPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
// birinchi foydalanuvchi bosishida ruxsat so'raymiz (brauzerlar avtomatik so'rovni bloklaydi)
document.addEventListener('click', requestNotificationPermission, {once:true});

async function checkForNewBookings(){
  let bookings;
  try{
    bookings = await apiGet('/bookings');
  }catch(e){
    return;
  }

  const currentIds = new Set(bookings.map(b=>b.id));

  if(knownBookingIds === null){
    // birinchi safar - shunchaki hozirgi holatni saqlaymiz, bildirishnoma chiqarmaymiz
    knownBookingIds = currentIds;
    return;
  }

  const newOnes = bookings.filter(b=>!knownBookingIds.has(b.id));
  if(newOnes.length > 0){
    newOnes.forEach(b=>{
      const sourceLabel = b.source === 'bot' ? 'Telegram bot' : 'Sayt';
      const title = 'Yangi navbat!';
      const desc = `${b.name} — ${b.service_name}, ${formatDate(b.date)} ${b.time} (${sourceLabel})`;
      showToast(title, desc);
      showBrowserNotification(title, desc);
    });
    playNotificationSound();
  }

  knownBookingIds = currentIds;
}

// ---------- avtomatik yangilanish (har 10 soniyada) ----------
setInterval(async ()=>{
  const activeTab = document.querySelector('.tab.active')?.dataset.tab;
  try{
    if(activeTab === 'admin'){
      // admin ro'yxatini yangilaymiz, lekin foydalanuvchi biror narsa o'chirish jarayonida bo'lsa aralashmaymiz
      const anyDeleting = document.querySelector('#bookingsList button.del:disabled');
      if(!anyDeleting){
        await renderAdminList();
      }
    } else {
      // "Navbat olish" tabida - faqat vaqt slotlarini yangilaymiz (forma maydonlariga tegmaymiz)
      await renderSlots();
    }
    await updateBadge();
  }catch(e){
    // jim tur - vaqtinchalik tarmoq xatosi bo'lishi mumkin
  }
  await checkForNewBookings();
}, 10000);

// birinchi tekshiruvni darhol qilamiz (bazaviy holatni bilish uchun)
checkForNewBookings();
</script>
</body>
</html>
